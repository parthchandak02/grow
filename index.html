<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Grow — a generative garden</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #f5f0ea;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
/* ponytail: zero dependencies. pure Canvas 2D API. works offline. */

// ────────────────────────────────────────────── CONFIG
const C = {
  maxTrees: 30,
  growEnd: 0.35,
  matureEnd: 0.55,
  autumnEnd: 0.75,
  witherEnd: 0.90,
  totalLife: 720,       // ~12s at 60fps
  swayAmp: 0.025,
  swaySpeed: 0.0018,
  maxDepth: 7,
  trunkMin: 50,
  trunkMax: 85,
};

// ────────────────────────────────────────────── PALETTES
const BG = '#f5f0ea';
const BRANCH_C = '#2b2520';
const LEAF_GREEN  = ['#5a8a5a','#6b9a6b','#4a7a4a','#7aaa6a','#3d6b3d'];
const LEAF_AUTUMN = [
  '#d4a030', // golden yellow
  '#c49030',
  '#c46a4d', // orange
  '#d47a5d',
  '#b45a3d',
  '#a06030',
  '#8b5a3d', // brown
];
const TXT = 'tap to plant a tree';

// ────────────────────────────────────────────── CANVAS
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ────────────────────────────────────────────── HELPERS
function lerpColor(a, b, t) {
  const ar=parseInt(a.slice(1,3),16), ag=parseInt(a.slice(3,5),16), ab=parseInt(a.slice(5,7),16);
  const br=parseInt(b.slice(1,3),16), bg=parseInt(b.slice(3,5),16), bb=parseInt(b.slice(5,7),16);
  return 'rgb('+Math.round(ar+(br-ar)*t)+','+Math.round(ag+(bg-ag)*t)+','+Math.round(ab+(bb-ab)*t)+')';
}
function lerpArray(arr, t) {
  if(t<=0)return arr[0]; if(t>=1)return arr[arr.length-1];
  const idx=Math.floor(t*(arr.length-1)), frac=t*(arr.length-1)-idx;
  return lerpColor(arr[idx], arr[Math.min(idx+1,arr.length-1)], frac);
}

// ────────────────────────────────────────────── STATE
let trees = [];
let fc = 0;
let touchGuard = false;

// ────────────────────────────────────────────── TREE
class Tree {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.age = 0;
    this.phase = Math.random() * Math.PI * 2;
    this.trunkLen = C.trunkMin + Math.random() * (C.trunkMax - C.trunkMin);
    this.maxD = 5 + Math.floor(Math.random() * 2);
    this.segments = [];
    this.leaves = [];
    this._grow(0, 0, -Math.PI / 2, this.trunkLen, 0, true);
  }

  _grow(x, y, angle, len, depth, isTrunk) {
    if (this.segments.length > 650) return;
    const ex = x + Math.cos(angle) * len;
    const ey = y + Math.sin(angle) * len;
    if (this.y + ey > H * 0.92) return;

    this.segments.push({ x1:x, y1:y, x2:ex, y2:ey, depth, isTrunk:isTrunk?1:0 });

    // Leaves at fine twigs (depth 3+, short branches)
    if (depth >= 3 && len < 14 && Math.random() < 0.6) {
      this.leaves.push({
        x: ex + (Math.random()-0.5)*5,
        y: ey + (Math.random()-0.5)*5,
        s: 8 + Math.random()*10,
        r: (Math.random()-0.5)*Math.PI*0.7,
        idx: Math.floor(Math.random()*LEAF_GREEN.length),
        fallT: 0.2 + Math.random()*0.8  // when during wither this leaf falls (0-1)
      });
    }

    if (depth >= this.maxD || len < 3) return;

    if (isTrunk && depth < 2) {
      const ta = angle + (Math.random()-0.5)*0.06;
      const tl = len * (0.68 + Math.random()*0.1);
      this._grow(ex, ey, ta, tl, depth+1, true);
    } else if (isTrunk && depth >= 2) {
      const n = 3 + Math.floor(Math.random()*3.5);
      for (let i = 0; i < n; i++) {
        const dir = Math.random()<0.5?1:-1;
        const limbAngle = angle + dir*(0.4+Math.random()*1.0) + (Math.random()-0.5)*0.3;
        const limbLen = len * (0.35+Math.random()*0.25);
        this._grow(ex, ey, limbAngle, limbLen, depth+1, false);
      }
      const ta = angle + (Math.random()-0.5)*0.08;
      const tl = len * (0.55+Math.random()*0.1);
      this._grow(ex, ey, ta, tl, depth+1, true);
    } else {
      const n = 2 + Math.floor(Math.random()*2.5);
      for (let i = 0; i < n; i++) {
        this._grow(ex, ey,
          angle + (Math.random()-0.5)*0.9,
          len * (0.50+Math.random()*0.2),
          depth+1, false);
      }
    }
  }

  get p() { return Math.min(this.age / C.totalLife, 1); }

  update() { if (this.age < C.totalLife) this.age++; }

  draw() {
    const p = this.p;
    ctx.save();
    ctx.translate(this.x, this.y);

    // Seed burst
    if (p < 0.08) { const s = 0.1 + p*11.25; ctx.scale(s,s); }

    // Sway during growth→mature
    if (p < C.witherEnd) {
      const swayStr = p < C.growEnd ? p/C.growEnd : 1;
      ctx.rotate(Math.sin(fc*C.swaySpeed+this.phase)*C.swayAmp*swayStr);
    }

    // ── Determine how many segments are visible ──
    let segCount;
    if (p < C.growEnd) {
      // Phase 1: growth — segments appear from base to tips
      segCount = Math.floor(this.segments.length * (p / C.growEnd));
    } else if (p < C.witherEnd) {
      // Phase 2-4: all segments visible (mature, autumn, wither)
      segCount = this.segments.length;
    } else {
      // Phase 5: death — segments disappear from tips back to base
      const deathP = (p - C.witherEnd) / (1 - C.witherEnd);
      segCount = Math.floor(this.segments.length * (1 - deathP));
    }

    // Branch color: darkens through wither
    let branchColor = BRANCH_C;
    if (p > C.autumnEnd) {
      const t = Math.min((p-C.autumnEnd)/(C.witherEnd-C.autumnEnd), 1);
      branchColor = lerpColor(BRANCH_C, '#1a1510', t);
    }

    for (let i = 0; i < segCount; i++) {
      const s = this.segments[i];
      const w = s.isTrunk
        ? Math.max(1.2, 5.5 - (s.depth/this.maxD)*4.0)
        : Math.max(0.3, 2.8 - (s.depth/this.maxD)*2.5);
      ctx.strokeStyle = branchColor;
      ctx.lineWidth = w;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(s.x1, s.y1);
      ctx.lineTo(s.x2, s.y2);
      ctx.stroke();
    }

    // ── Leaves ──
    if (p < C.witherEnd) {
      const leafAppear = Math.min(Math.max((p-0.12)/(C.growEnd-0.12), 0), 1);

      // Determine which leaves are still on the tree
      for (let i = 0; i < this.leaves.length; i++) {
        const l = this.leaves[i];

        // During wither: leaves fall when progress exceeds their fallT
        let visible = true;
        if (p > C.autumnEnd) {
          const witherP = (p - C.autumnEnd) / (C.witherEnd - C.autumnEnd);
          if (witherP > l.fallT) visible = false;
        }

        // During growth: leaf appears based on leafAppear
        if (p < C.growEnd) {
          // Leaves appear in bursts — first leaves at top appear later
          const leafOrder = i / this.leaves.length; // 0 at bottom, 1 at top
          if (leafAppear < leafOrder * 1.0) visible = false;
        }

        if (!visible) continue;

        ctx.save();
        ctx.translate(l.x, l.y);
        ctx.rotate(l.r);
        if (p > C.growEnd && p < C.autumnEnd) {
          ctx.rotate(Math.sin(fc*C.swaySpeed*1.5+this.phase+i)*C.swayAmp*0.6);
        }

        // ── Leaf color through seasons ──
        let leafColor;
        if (p < C.matureEnd) {
          // Green phase
          leafColor = lerpArray(LEAF_GREEN, (l.idx + i*0.1) % 1);
        } else if (p < C.autumnEnd) {
          // Autumn: green → golden yellow → orange → brown
          const autumnP = (p - C.matureEnd) / (C.autumnEnd - C.matureEnd);
          if (autumnP < 0.33) {
            // Green → golden yellow
            const t = autumnP / 0.33;
            const green = lerpArray(LEAF_GREEN, (l.idx + i*0.1) % 1);
            leafColor = lerpColor(green, '#d4a030', t);
          } else if (autumnP < 0.66) {
            // Golden yellow → orange
            const t = (autumnP - 0.33) / 0.33;
            leafColor = lerpColor('#d4a030', '#c46a4d', t);
          } else {
            // Orange → brown
            const t = (autumnP - 0.66) / 0.34;
            leafColor = lerpColor('#c46a4d', '#8b5a3d', t);
          }
        } else {
          // Wither phase: brown leaves darken slightly
          const witherP = (p - C.autumnEnd) / (C.witherEnd - C.autumnEnd);
          leafColor = lerpColor('#8b5a3d', '#5a3a2d', Math.min(witherP*1.5, 1));
        }

        ctx.fillStyle = leafColor;
        ctx.beginPath();
        ctx.ellipse(0, 0, l.s/2, l.s*0.28, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ── Death: empty skeleton droops and fades ──
    if (p > C.witherEnd) {
      const deathP = (p - C.witherEnd) / (1 - C.witherEnd);
      if (deathP > 0.3) {
        ctx.translate(0, deathP*15);
        ctx.scale(1-(deathP-0.3)*0.3, 1-(deathP-0.3)*0.3);
      }
      ctx.globalAlpha = Math.max(0, 1-deathP);
    }

    ctx.restore();
  }
}

// ────────────────────────────────────────────── LOOP
function draw() {
  fc++;
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  for (let i = trees.length-1; i >= 0; i--) { trees[i].update(); trees[i].draw(); }
  for (let i = trees.length-1; i >= 0; i--) { if (trees[i].p >= 1) trees.splice(i, 1); }

  if (trees.length < 5) {
    ctx.fillStyle = BRANCH_C;
    ctx.font = '13px serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'bottom';
    ctx.fillText(TXT, 16, H-16);
  }

  requestAnimationFrame(draw);
}

// ────────────────────────────────────────────── PLANTING
function plantAt(x, y) { if (trees.length < C.maxTrees) trees.push(new Tree(x, y)); }

canvas.addEventListener('click', (e) => {
  if (touchGuard) { touchGuard = false; return; }
  plantAt(e.clientX, e.clientY);
});
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  touchGuard = true;
  setTimeout(() => { touchGuard = false; }, 200);
  const t = e.touches[0];
  if (t) plantAt(t.clientX, t.clientY);
}, { passive: false });
canvas.addEventListener('touchend', (e) => e.preventDefault(), { passive: false });

// ────────────────────────────────────────────── START
trees.push(new Tree(W/2, H*0.68));
draw();
</script>
</body>
</html>
