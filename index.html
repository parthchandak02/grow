<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Grow — a generative garden</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#f5f0ea;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none}
canvas{display:block}
#controls{position:fixed;bottom:16px;right:16px;z-index:10;display:flex;flex-direction:column;align-items:flex-end;gap:8px;font-family:serif;color:#2b2520}
#ctrlToggle{width:36px;height:36px;border-radius:50%;border:1px solid #2b2520;background:#f5f0ea;color:#2b2520;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
#ctrlToggle:hover{background:#e8e0d0}
#ctrlToggle.active{background:#2b2520;color:#f5f0ea}
#ctrlPanel{display:none;flex-direction:column;gap:8px;background:#f5f0ea;border:1px solid #2b2520;border-radius:12px;padding:14px 16px;min-width:240px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
#ctrlPanel.open{display:flex}
.ctrl-row{display:flex;align-items:center;gap:8px;font-size:12px}
.ctrl-row label{width:55px;text-align:right;white-space:nowrap}
.ctrl-row input[type="range"]{flex:1;height:2px;-webkit-appearance:none;appearance:none;background:#c9b99a;border-radius:1px;outline:none;cursor:pointer}
.ctrl-row input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#2b2520;border:none;cursor:pointer}
.ctrl-row input[type="range"]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#2b2520;border:none;cursor:pointer}
.ctrl-val{width:32px;text-align:right;font-size:11px;color:#6b5a4a}
.ctrl-note{font-size:10px;color:#a09080;text-align:center;padding-top:4px;border-top:1px solid #e0d8c8}
.mode-row{display:flex;gap:4px;margin-bottom:4px;background:#e8e0d0;border-radius:8px;padding:2px}
.mode-btn{flex:1;text-align:center;padding:4px 8px;border-radius:6px;font-size:11px;cursor:pointer;border:none;background:transparent;color:#6b5a4a;transition:all .2s}
.mode-btn.active{background:#2b2520;color:#f5f0ea}
.mode-btn:not(.active):hover{background:#d8d0c0}
#dataBadge{font-size:10px;color:#6b5a4a;text-align:center;padding:6px 8px;background:#f0ebe0;border-radius:6px;line-height:1.4}
#dataBadge .val{font-weight:bold;color:#2b2520}
#dataBadge .src{font-size:9px;color:#a09080;display:block;margin-top:2px}
#dataBadge .sub{font-size:9px;color:#8b7a6a;display:block;margin-top:1px}
.info-line{font-size:9px;color:#8b7a6a;text-align:center;padding:6px 4px 0;line-height:1.4;font-style:italic;border-top:1px solid #e0d8c8}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
<div id="ctrlPanel">
<div class="mode-row"><button class="mode-btn" id="modeTimeline">Timeline</button><button class="mode-btn active" id="modeManual">Manual</button></div>
<div id="dataBadge">Loading deforestation data...</div>
<div class="ctrl-row" id="manualSliders"><label>Speed</label><input type="range" id="sSpeed" min="0.3" max="3" step="0.1" value="1"><span class="ctrl-val" id="vSpeed">1x</span></div>
<div class="ctrl-row" id="lifeRow"><label>Lifespan</label><input type="range" id="sLife" min="5" max="25" step="1" value="12"><span class="ctrl-val" id="vLife">12s</span></div>
<div class="ctrl-row" id="sizeRow"><label>Size</label><input type="range" id="sSize" min="0.4" max="2" step="0.1" value="1"><span class="ctrl-val" id="vSize">100%</span></div>
<div class="ctrl-row" id="denseRow"><label>Density</label><input type="range" id="sDense" min="0.3" max="2.5" step="0.1" value="1"><span class="ctrl-val" id="vDense">1x</span></div>
<div class="ctrl-row" id="swayRow"><label>Sway</label><input type="range" id="sSway" min="0" max="4" step="0.1" value="1"><span class="ctrl-val" id="vSway">1x</span></div>
<div class="ctrl-note" id="affectsNote">affects new trees</div>
<div class="info-line" id="infoLine">Timeline: deforestation data 1991-2025. Each small tree = ~500K hectares. Brown = loss, green = gain. Trees accumulate over time.</div>
</div>
<button id="ctrlToggle">⚙</button>
</div>
<script>
const C={maxTrees:30,growEnd:0.35,matureEnd:0.55,autumnEnd:0.75,witherEnd:0.90,baseLife:720,swayAmp:0.025,swaySpeed:0.0018,maxDepth:7,trunkMin:50,trunkMax:85,densityMul:1};
const P={speed:1,lifespan:12,size:1,density:1,sway:1};
const BG='#f5f0ea',BRANCH_C='#2b2520',DEAD_C='#3a2a1a';
const LEAF_GREEN=['#5a8a5a','#6b9a6b','#4a7a4a','#7aaa6a','#3d6b3d'];
const HECTARES_PER_TREE=500000;
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
let mode='manual',worldData=[],deforestFactor=1;
let timelineIdx=0,timelineTicks=0,totalForestChange=0;
let clusterTimer=0,clusterTrees=[]; // timeline mode: persistent small trees
let manualTrees=[]; // manual mode: lifecycle trees
let fc=0,touchGuard=false;
function lerpColor(a,b,t){const ar=parseInt(a.slice(1,3),16),ag=parseInt(a.slice(3,5),16),ab=parseInt(a.slice(5,7),16);const br=parseInt(b.slice(1,3),16),bg=parseInt(b.slice(3,5),16),bb=parseInt(b.slice(5,7),16);return'rgb('+Math.round(ar+(br-ar)*t)+','+Math.round(ag+(bg-ag)*t)+','+Math.round(ab+(bb-ab)*t)+')';}
function lerpArray(arr,t){if(t<=0)return arr[0];if(t>=1)return arr[arr.length-1];const idx=Math.floor(t*(arr.length-1)),frac=t*(arr.length-1)-idx;return lerpColor(arr[idx],arr[Math.min(idx+1,arr.length-1)],frac);}
function fmtHectares(n){const abs=Math.abs(n);if(abs>=1e12)return(abs/1e12).toFixed(1)+'T';if(abs>=1e9)return(abs/1e9).toFixed(1)+'B';if(abs>=1e6)return(abs/1e6).toFixed(1)+'M';if(abs>=1e3)return(abs/1e3).toFixed(1)+'K';return abs.toFixed(0);}

// ── DATA LOADING ──
async function loadDeforestData(){
  const badge=document.getElementById('dataBadge');
  try{
    let resp=await fetch('https://raw.githubusercontent.com/parthchandak02/grow/main/deforestation_data.csv');
    if(!resp.ok)throw new Error('fail');
    let text=await resp.text();
    const lines=text.split('\n');
    for(let i=1;i<lines.length;i++){
      if(!lines[i].trim())continue;
      const parts=lines[i].split(',');
      if(parts[0].trim()!=='World')continue;
      const yr=parseInt(parts[2]);const val=parseFloat(parts[3]);
      if(yr&&!isNaN(val))worldData.push({year:yr,value:val});
    }
    worldData.sort((a,b)=>a.year-b.year);
    if(worldData.length>0){
      const l=worldData[worldData.length-1];
      badge.innerHTML=`<span class="val">${(Math.abs(l.value)/1e6).toFixed(1)}M hectares</span> globally <span class="sub">${worldData[0].year}-${worldData[worldData.length-1].year} · Each tree = ${fmtHectares(HECTARES_PER_TREE)} ha</span><span class="src">FAO via Our World in Data</span>`;
    }else{badge.innerHTML='No data. Using simulation.';loadFallback();}
  }catch(e){badge.innerHTML='Could not load data.';loadFallback();}
}
function loadFallback(){
  for(let y=1991;y<=2025;y++)worldData.push({year:y,value:-2000000+Math.random()*6000000});
}

// ── CONTROLS ──
const ctrlToggle=document.getElementById('ctrlToggle'),ctrlPanel=document.getElementById('ctrlPanel');
ctrlToggle.addEventListener('click',()=>{ctrlPanel.classList.toggle('open');ctrlToggle.classList.toggle('active');});
function setupSlider(id,valId,onChange){const s=document.getElementById(id);s.addEventListener('input',()=>onChange(parseFloat(s.value)));}
setupSlider('sSpeed','vSpeed',v=>{P.speed=v;document.getElementById('vSpeed').textContent=v+'x';});
setupSlider('sLife','vLife',v=>{P.lifespan=v;document.getElementById('vLife').textContent=v+'s';});
setupSlider('sSize','vSize',v=>{P.size=v;document.getElementById('vSize').textContent=Math.round(v*100)+'%';});
setupSlider('sDense','vDense',v=>{P.density=v;C.densityMul=v;document.getElementById('vDense').textContent=v+'x';});
setupSlider('sSway','vSway',v=>{P.sway=v;document.getElementById('vSway').textContent=v+'x';});

const modeTimeline=document.getElementById('modeTimeline'),modeManualBtn=document.getElementById('modeManual');
const sliders=[document.getElementById('sSpeed'),document.getElementById('sLife'),document.getElementById('sSize'),document.getElementById('sDense'),document.getElementById('sSway')];
modeTimeline.addEventListener('click',()=>{
  mode='timeline';timelineIdx=0;timelineTicks=0;totalForestChange=0;clusterTimer=0;
  clusterTrees=[];manualTrees=[]; // clear all trees on timeline start
  modeTimeline.classList.add('active');modeManualBtn.classList.remove('active');
  sliders.forEach(s=>{s.disabled=true;s.style.opacity='0.4';});
});
modeManualBtn.addEventListener('click',()=>{
  mode='manual';
  modeManualBtn.classList.add('active');modeTimeline.classList.remove('active');
  sliders.forEach(s=>{s.disabled=false;s.style.opacity='1';});
});

// ── TIMELINE TREES ──
class TimelineTree{
  constructor(x,y,isDead){
    this.x=x;this.y=y;this.isDead=isDead;
    this.size=0.15+Math.random()*0.15; // small: 15-30% of normal
    this.phase=Math.random()*Math.PI*2;
    if(isDead)this.branchColor='#3a2a1a';else this.branchColor='#2b2520';
    this.maxD=3+Math.floor(Math.random()*2);
    this.segments=[];this.leaves=[];
    this._grow(0,0,-Math.PI/2,25+Math.random()*20,0,true);
  }
  _grow(x,y,angle,len,depth,isTrunk){
    if(this.segments.length>100)return;
    const ex=x+Math.cos(angle)*len,ey=y+Math.sin(angle)*len;
    if(this.y+ey>H*0.92)return;
    this.segments.push({x1:x,y1:y,x2:ex,y2:ey,depth,isTrunk:isTrunk?1:0});
    if(!this.isDead&&depth>=3&&len<12&&Math.random()<0.5){
      this.leaves.push({x:ex+(Math.random()-0.5)*4,y:ey+(Math.random()-0.5)*4,s:5+Math.random()*6,r:(Math.random()-0.5)*Math.PI*0.7,idx:Math.floor(Math.random()*LEAF_GREEN.length)});
    }
    if(depth>=this.maxD||len<2)return;
    if(isTrunk&&depth<2){this._grow(ex,ey,angle+(Math.random()-0.5)*0.08,len*(0.7+Math.random()*0.1),depth+1,true);}
    else if(isTrunk&&depth>=2){
      const n=2+Math.floor(Math.random()*2);
      for(let i=0;i<n;i++){const dir=Math.random()<0.5?1:-1;this._grow(ex,ey,angle+dir*(0.4+Math.random()*0.8)+(Math.random()-0.5)*0.3,len*(0.35+Math.random()*0.2),depth+1,false);}
      this._grow(ex,ey,angle+(Math.random()-0.5)*0.1,len*(0.6+Math.random()*0.1),depth+1,true);
    }else{const n=1+Math.floor(Math.random()*2);for(let i=0;i<n;i++)this._grow(ex,ey,angle+(Math.random()-0.5)*0.8,len*(0.5+Math.random()*0.2),depth+1,false);}
  }
  draw(sizeMul){
    ctx.save();ctx.translate(this.x,this.y);ctx.scale(this.size*sizeMul,this.size*sizeMul);
    ctx.rotate(Math.sin(fc*0.002+this.phase)*0.02);
    for(let i=0;i<this.segments.length;i++){
      const s=this.segments[i];
      const w=s.isTrunk?Math.max(1,4-(s.depth/this.maxD)*3):Math.max(0.3,2-(s.depth/this.maxD)*1.7);
      ctx.strokeStyle=this.branchColor;ctx.lineWidth=w;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();
    }
    for(let i=0;i<this.leaves.length;i++){
      const l=this.leaves[i];ctx.save();ctx.translate(l.x,l.y);ctx.rotate(l.r);
      ctx.fillStyle=lerpArray(LEAF_GREEN,(l.idx+i*0.1)%1);ctx.beginPath();
      ctx.ellipse(0,0,l.s/2,l.s*0.28,0,0,Math.PI*2);ctx.fill();ctx.restore();
    }
    ctx.restore();
  }
}

// ── MANUAL TREES (existing lifecycle) ──
class ManualTree{
  constructor(x,y){
    this.x=x;this.y=y;this.age=0;this.phase=Math.random()*Math.PI*2;
    const dm=C.densityMul;
    this.trunkLen=(C.trunkMin+Math.random()*(C.trunkMax-C.trunkMin))*dm;
    this.maxD=Math.min(7,Math.max(4,5+Math.floor((dm-0.5)*2)));
    this.segments=[];this.leaves=[];this._grow(0,0,-Math.PI/2,this.trunkLen,0,true);
  }
  _grow(x,y,angle,len,depth,isTrunk){
    if(this.segments.length>650)return;
    const ex=x+Math.cos(angle)*len,ey=y+Math.sin(angle)*len;
    if(this.y+ey>H*0.92)return;
    this.segments.push({x1:x,y1:y,x2:ex,y2:ey,depth,isTrunk:isTrunk?1:0});
    if(depth>=3&&len<14&&Math.random()<0.6)this.leaves.push({x:ex+(Math.random()-0.5)*5,y:ey+(Math.random()-0.5)*5,s:8+Math.random()*10,r:(Math.random()-0.5)*Math.PI*0.7,idx:Math.floor(Math.random()*LEAF_GREEN.length),fallT:0.2+Math.random()*0.8});
    if(depth>=this.maxD||len<3)return;const dMul=C.densityMul;
    if(isTrunk&&depth<2){this._grow(ex,ey,angle+(Math.random()-0.5)*0.06,len*(0.68+Math.random()*0.1),depth+1,true);}
    else if(isTrunk&&depth>=2){
      const n=Math.round((3+Math.random()*3)*dMul);
      for(let i=0;i<n;i++){const dir=Math.random()<0.5?1:-1;this._grow(ex,ey,angle+dir*(0.4+Math.random()*1.0)+(Math.random()-0.5)*0.3,len*(0.35+Math.random()*0.25)*Math.min(dMul,1.3),depth+1,false);}
      this._grow(ex,ey,angle+(Math.random()-0.5)*0.08,len*(0.55+Math.random()*0.1),depth+1,true);
    }else{const n=Math.round((2+Math.random()*2)*dMul);for(let i=0;i<n;i++)this._grow(ex,ey,angle+(Math.random()-0.5)*0.9,len*(0.50+Math.random()*0.2),depth+1,false);}
  }
  get p(){return Math.min(this.age/C.baseLife,1);}
  update(){if(this.age<C.baseLife)this.age+=P.speed;}
  draw(){
    const p=this.p;ctx.save();ctx.translate(this.x,this.y);ctx.scale(P.size,P.size);
    if(p<0.08){const s=0.1+p*11.25;ctx.scale(s,s);}
    if(p<C.witherEnd){const sw=p<C.growEnd?p/C.growEnd:1;ctx.rotate(Math.sin(fc*C.swaySpeed*P.sway+this.phase)*C.swayAmp*P.sway*sw);}
    let segCount;if(p<C.growEnd)segCount=Math.floor(this.segments.length*(p/C.growEnd));else if(p<C.witherEnd)segCount=this.segments.length;else{const d=(p-C.witherEnd)/(1-C.witherEnd);segCount=Math.floor(this.segments.length*(1-d));}
    let bc=BRANCH_C;if(p>C.autumnEnd){const t=Math.min((p-C.autumnEnd)/(C.witherEnd-C.autumnEnd),1);bc=lerpColor(BRANCH_C,'#1a1510',t);}
    for(let i=0;i<segCount;i++){const s=this.segments[i];const w=s.isTrunk?Math.max(1.2,5.5-(s.depth/this.maxD)*4.0):Math.max(0.3,2.8-(s.depth/this.maxD)*2.5);ctx.strokeStyle=bc;ctx.lineWidth=w;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();}
    if(p<C.witherEnd){const lA=Math.min(Math.max((p-0.12)/(C.growEnd-0.12),0),1);for(let i=0;i<this.leaves.length;i++){const l=this.leaves[i];let vis=true,ls=1;if(p>C.autumnEnd){const wP=(p-C.autumnEnd)/(C.witherEnd-C.autumnEnd);if(wP>l.fallT){const fP=Math.min((wP-l.fallT)/(1-l.fallT),1);ls=1-fP*0.92;if(ls<=0.08)vis=false;}}if(p<C.growEnd&&lA<(i/this.leaves.length)*1.0)vis=false;if(!vis)continue;ctx.save();ctx.translate(l.x,l.y);ctx.scale(ls,ls);ctx.rotate(l.r);if(p>C.growEnd&&p<C.autumnEnd)ctx.rotate(Math.sin(fc*C.swaySpeed*P.sway*1.5+this.phase+i)*C.swayAmp*P.sway*0.6);let lc;if(p<C.matureEnd)lc=lerpArray(LEAF_GREEN,(l.idx+i*0.1)%1);else if(p<C.autumnEnd){const aP=(p-C.matureEnd)/(C.autumnEnd-C.matureEnd);if(aP<0.33)lc=lerpColor(lerpArray(LEAF_GREEN,(l.idx+i*0.1)%1),'#d4a030',aP/0.33);else if(aP<0.66)lc=lerpColor('#d4a030','#c46a4d',(aP-0.33)/0.33);else lc=lerpColor('#c46a4d','#8b5a3d',(aP-0.66)/0.34);}else{const t=Math.min((p-C.autumnEnd)/(C.witherEnd-C.autumnEnd)*1.5,1);lc=lerpColor('#8b5a3d','#5a3a2d',t);}ctx.fillStyle=lc;ctx.beginPath();ctx.ellipse(0,0,l.s/2,l.s*0.28,0,0,Math.PI*2);ctx.fill();ctx.restore();}}
    if(p>C.witherEnd){const dP=(p-C.witherEnd)/(1-C.witherEnd);if(dP>0.3){ctx.translate(0,dP*15);ctx.scale(1-(dP-0.3)*0.3,1-(dP-0.3)*0.3);}ctx.globalAlpha=Math.max(0,1-dP);}ctx.restore();
  }
}

// ── DRAW LOOP ──
function draw(){
  fc++;C.baseLife=Math.round(P.lifespan*60);
  ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);

  if(mode==='timeline'&&worldData.length>0){
    const curYear=worldData[timelineIdx];
    timelineTicks++;

    // Advance year every ~60 frames (1 second)
    if(timelineTicks>60){
      timelineTicks=0;
      totalForestChange+=curYear.value;
      timelineIdx=(timelineIdx+1)%worldData.length;
      // Spawn cluster of trees for this year
      const nextYear=worldData[timelineIdx];
      const absLoss=Math.abs(nextYear.value);
      const treeCount=Math.max(2,Math.min(12,Math.round(absLoss/HECTARES_PER_TREE)));
      const isLoss=nextYear.value>0;
      for(let i=0;i<treeCount;i++){
        const x=40+Math.random()*(W-80);
        const y=H*(0.45+Math.random()*0.4);
        clusterTrees.push(new TimelineTree(x,y,isLoss));
      }
    }

    // Update badge
    const nextYear=worldData[timelineIdx];
    const badge=document.getElementById('dataBadge');
    const dir=nextYear.value>0?'lost':'gained';
    const cumulativeDir=totalForestChange>0?'lost total':'gained total';
    const treesThisYear=Math.max(2,Math.min(12,Math.round(Math.abs(nextYear.value)/HECTARES_PER_TREE)));
    badge.innerHTML=`<span class="val">${nextYear.year}: ${fmtHectares(Math.abs(nextYear.value))} ha ${dir}</span> <span class="sub">${treesThisYear} trees this year · ${fmtHectares(Math.abs(totalForestChange))} ha ${cumulativeDir} since 1991</span><span class="src">Timeline: 1s = 1 year · Loops through 1991-2025 · Trees accumulate</span>`;

    // Draw timeline bar at top
    const barMax=6000000,maxBars=30;
    const barY=12,barH=10,pad=3,bars=Math.min(timelineIdx+1,maxBars);
    const usableW=Math.min(W-60,500);
    const barW=Math.max(4,(usableW-(bars-1)*pad)/bars);
    const startX=(W-(bars*pad+(bars-1)*barW))/2;
    ctx.fillStyle='rgba(43,37,32,0.06)';ctx.roundRect(startX-4,barY-2,usableW+8,barH+4,4);ctx.fill();
    for(let i=0;i<bars;i++){
      const idx=(timelineIdx-bars+1+i+worldData.length)%worldData.length;
      const yr=worldData[idx];
      const ratio=Math.min(Math.abs(yr.value)/barMax,1);
      const bx=startX+i*(barW+pad);
      if(yr.value>0){ctx.fillStyle=lerpColor('#f5f0ea','#8b5a3d',ratio);}
      else{ctx.fillStyle=lerpColor('#f5f0ea','#4a7a4a',ratio);}
      ctx.roundRect(bx,barY,barW,barH,2);ctx.fill();
    }
    // Year label under bar
    ctx.fillStyle='rgba(43,37,32,0.35)';ctx.font='9px serif';ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(worldData[timelineIdx].year,W/2,barY+barH+4);
  }

  // Draw trees
  if(mode==='timeline'){
    for(let i=clusterTrees.length-1;i>=0;i--)clusterTrees[i].draw(1);
  }else{
    for(let i=manualTrees.length-1;i>=0;i--){manualTrees[i].update();manualTrees[i].draw();}
    for(let i=manualTrees.length-1;i>=0;i--){if(manualTrees[i].p>=1)manualTrees.splice(i,1);}
  }

  if(manualTrees.length<5&&mode==='manual'){
    ctx.fillStyle=BRANCH_C;ctx.font='13px serif';ctx.textAlign='left';ctx.textBaseline='bottom';
    ctx.fillText('tap to plant a tree',16,H-16);
  }
  requestAnimationFrame(draw);
}

canvas.addEventListener('click',e=>{if(touchGuard){touchGuard=false;return;}if(e.target.closest('#controls'))return;if(mode==='manual'){if(manualTrees.length<C.maxTrees)manualTrees.push(new ManualTree(e.clientX,e.clientY));}});
canvas.addEventListener('touchstart',e=>{e.preventDefault();touchGuard=true;setTimeout(()=>{touchGuard=false;},200);const t=e.touches[0];if(t&&mode==='manual'&&manualTrees.length<C.maxTrees)manualTrees.push(new ManualTree(t.clientX,t.clientY));},{passive:false});
canvas.addEventListener('touchend',e=>e.preventDefault(),{passive:false});

loadDeforestData();
manualTrees.push(new ManualTree(W/2,H*0.68));
draw();
</script>
