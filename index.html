<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Grow — forest through time</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#f5f0ea;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none}
canvas{display:block}
#controls{position:fixed;bottom:14px;right:14px;z-index:10;display:flex;flex-direction:column;align-items:flex-end;gap:6px;font-family:serif;color:#2b2520}
#ctrlToggle{width:32px;height:32px;border-radius:50%;border:1px solid #2b2520;background:#f5f0ea;color:#2b2520;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;opacity:0.5}
#ctrlToggle:hover{opacity:1}
#ctrlToggle.active{background:#2b2520;color:#f5f0ea;opacity:1}
#ctrlPanel{display:none;flex-direction:column;gap:6px;background:#f5f0ea;border:1px solid #2b2520;border-radius:10px;padding:10px 12px;min-width:200px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
#ctrlPanel.open{display:flex}
.ctrl-row{display:flex;align-items:center;gap:6px;font-size:11px}
.ctrl-row label{width:50px;text-align:right;white-space:nowrap}
.ctrl-row input[type="range"]{flex:1;height:2px;-webkit-appearance:none;appearance:none;background:#c9b99a;border-radius:1px;outline:none;cursor:pointer}
.ctrl-row input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#2b2520;border:none;cursor:pointer}
.ctrl-row input[type="range"]::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:#2b2520;border:none;cursor:pointer}
.ctrl-val{width:28px;text-align:right;font-size:10px;color:#6b5a4a}
.ctrl-note{font-size:9px;color:#a09080;text-align:center;padding-top:3px;border-top:1px solid #e0d8c8}
.mode-row{display:flex;gap:3px;margin-bottom:2px;background:#e8e0d0;border-radius:6px;padding:2px}
.mode-btn{flex:1;text-align:center;padding:3px 6px;border-radius:5px;font-size:10px;cursor:pointer;border:none;background:transparent;color:#6b5a4a;transition:all .2s}
.mode-btn.active{background:#2b2520;color:#f5f0ea}
.mode-btn:not(.active):hover{background:#d8d0c0}
.info-line{font-size:8px;color:#8b7a6a;text-align:center;line-height:1.3;font-style:italic;border-top:1px solid #e0d8c8;padding-top:4px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
<div id="ctrlPanel">
<div class="mode-row"><button class="mode-btn" id="modeTimeline">Timeline</button><button class="mode-btn active" id="modeManual">Manual</button></div>
<div id="ctrl-sliders">
<div class="ctrl-row"><label>Speed</label><input type="range" id="sSpeed" min="0.3" max="3" step="0.1" value="1"><span class="ctrl-val" id="vSpeed">1x</span></div>
<div class="ctrl-row"><label>Lifespan</label><input type="range" id="sLife" min="5" max="25" step="1" value="12"><span class="ctrl-val" id="vLife">12s</span></div>
<div class="ctrl-row"><label>Size</label><input type="range" id="sSize" min="0.4" max="2" step="0.1" value="1"><span class="ctrl-val" id="vSize">100%</span></div>
<div class="ctrl-row"><label>Sway</label><input type="range" id="sSway" min="0" max="4" step="0.1" value="1"><span class="ctrl-val" id="vSway">1x</span></div>
<div class="ctrl-note">tap canvas to plant</div>
</div>
<div class="info-line">Timeline: 1s per year · trees accumulate · bottom line shows cumulative change</div>
</div>
<button id="ctrlToggle">⚙</button>
</div>
<script>
const BG='#f5f0ea',HECTARES_PER_TREE=500000;
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,TBAR_H=36,GAPH=44; // top bar height, bottom graph height
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

let mode='manual',worldData=[],fc=0,touchGuard=false;
let tlIdx=0,tlTick=0,cumul=0,tlTrees=[],linePts=[];
let prevMode='manual';

// ── COLORS ──
const LIVE_C='#4a7a4a',DEAD_C='#5a3a2d',TRUNK_C='#3a2a1a',EMPTY_C='#c9b99a';

// ── HELPERS ──
function lerpC(a,b,t){
  const A=parseInt(a.slice(1),16),R=A>>16,G=(A>>8)&255,B=A&255;
  const B2=parseInt(b.slice(1),16),R2=B2>>16,G2=(B2>>8)&255,B2l=B2&255;
  return `rgb(${Math.round(R+(R2-R)*t)},${Math.round(G+(G2-G)*t)},${Math.round(B+(B2l-B)*t)})`;
}
function fmtN(n){const a=Math.abs(n);if(a>=1e9)return(a/1e9).toFixed(1)+'B';if(a>=1e6)return(a/1e6).toFixed(1)+'M';if(a>=1e3)return(a/1e3).toFixed(0)+'K';return a.toFixed(0);}

// ── DATA ──
async function loadData(){
  try{
    let r=await fetch('https://raw.githubusercontent.com/parthchandak02/grow/main/deforestation_data.csv');
    if(!r.ok)throw Error();
    let t=await r.text();
    const lines=t.split('\n');
    for(let i=1;i<lines.length;i++){
      if(!lines[i].trim())continue;
      const p=lines[i].split(',');
      if(p[0].trim()!=='World')continue;
      const yr=parseInt(p[2]),val=parseFloat(p[3]);
      if(yr&&!isNaN(val))worldData.push({year:yr,value:val});
    }
    worldData.sort((a,b)=>a.year-b.year);
  }catch(e){
    for(let y=1991;y<=2025;y++)worldData.push({year:y,value:-2000000+Math.random()*5000000});
  }
}

// ── CONTROLS ──
const cT=document.getElementById('ctrlToggle'),cP=document.getElementById('ctrlPanel');
cT.addEventListener('click',()=>{cP.classList.toggle('open');cT.classList.toggle('active');});
const mTl=document.getElementById('modeTimeline'),mMan=document.getElementById('modeManual');
const slidersDiv=document.getElementById('ctrl-sliders');
mTl.addEventListener('click',()=>{
  if(mode==='timeline')return;
  mode='timeline';tlIdx=0;tlTick=0;cumul=0;tlTrees=[];linePts=[];
  mTl.classList.add('active');mMan.classList.remove('active');
  slidersDiv.style.display='none';
});
mMan.addEventListener('click',()=>{
  if(mode==='manual')return;
  mode='manual';
  mMan.classList.add('active');mTl.classList.remove('active');
  slidersDiv.style.display='flex';
});

function ss(id,valId,fn){const s=document.getElementById(id);s.addEventListener('input',()=>fn(parseFloat(s.value)));}
ss('sSpeed','vSpeed',v=>{document.getElementById('vSpeed').textContent=v+'x';C.speed=v;});
ss('sLife','vLife',v=>{document.getElementById('vLife').textContent=v+'s';C.life=v;});
ss('sSize','vSize',v=>{document.getElementById('vSize').textContent=Math.round(v*100)+'%';C.size=v;});
ss('sSway','vSway',v=>{document.getElementById('vSway').textContent=v+'x';C.sway=v;});
let C={speed:1,life:12,size:1,sway:1};

// ── TIMELINE TREES ──
class TlTree{
  constructor(x,y,sz,mag,isDead){
    this.x=x;this.y=y;this.sz=sz;this.mag=mag;this.isDead=isDead;
    this.trunkH=12+mag*8;this.ph=Math.random()*6.28;
    this.branches=[];this.canopyR=isDead?0:4+mag*3;
    for(let i=0;i<2+Math.floor(mag*2);i++){
      this.branches.push({a:(Math.random()-0.5)*1.2,l:4+Math.random()*6});
    }
  }
  draw(){
    const s=this.sz*0.9;
    ctx.save();ctx.translate(this.x,this.y);ctx.scale(s,s);
    // Trunk
    ctx.strokeStyle=this.isDead?'#3a2a1a':'#3a2a1a';ctx.lineWidth=1.5;
    ctx.lineCap='round';ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-this.trunkH);ctx.stroke();
    // Branches
    for(const b of this.branches){
      ctx.strokeStyle=this.isDead?DEAD_C:TRUNK_C;ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(0,-this.trunkH*0.7);ctx.lineTo(Math.cos(b.a)*b.l,-this.trunkH*0.7-Math.sin(b.a)*b.l);ctx.stroke();
    }
    // Canopy (live trees only)
    if(!this.isDead&&this.canopyR>2){
      const g=ctx.createRadialGradient(0,-this.trunkH*0.5,1,0,-this.trunkH*0.5,this.canopyR);
      g.addColorStop(0,'#6b9a6b');g.addColorStop(0.5,'#4a7a4a');g.addColorStop(1,'rgba(74,122,74,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,-this.trunkH*0.5,this.canopyR,0,6.28);ctx.fill();
    }
    ctx.restore();
  }
}

// ── MANUAL TREES ──
class ManTree{
  constructor(x,y){
    this.x=x;this.y=y;this.age=0;this.ph=Math.random()*6.28;
    this.h=40+Math.random()*45;this.branches=[];
    const n=3+Math.floor(Math.random()*4);
    for(let i=0;i<n;i++)this.branches.push({a:(Math.random()-0.5)*1.0,l:10+Math.random()*12,sa:(Math.random()-0.5)*0.3});
    this.leaves=[];const lf=8+Math.floor(Math.random()*8);
    for(let i=0;i<lf;i++)this.leaves.push({x:(Math.random()-0.5)*12,y:-(8+Math.random()*this.h*0.6),r:5+Math.random()*8});
  }
  get p(){return Math.min(this.age/(C.life*60),1);}
  update(){if(this.age<C.life*60)this.age+=C.speed;}
  draw(){
    const p=this.p;
    if(p>0.95)return; // fade out at end
    ctx.save();ctx.translate(this.x,this.y);
    ctx.scale(C.size,C.size);
    // Growth
    const g=Math.min(p/0.35,1);
    ctx.scale(g,g);
    // Sway
    if(p<0.9)ctx.rotate(Math.sin(fc*0.003*C.sway+this.ph)*0.02*C.sway);
    // Trunk
    ctx.strokeStyle=TRUNK_C;ctx.lineWidth=2;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-this.h*g);ctx.stroke();
    // Branches
    for(const b of this.branches){
      const bl=b.l*g;ctx.strokeStyle=TRUNK_C;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(0,-this.h*0.6*g);ctx.lineTo(Math.cos(b.a)*bl,-this.h*0.6*g-Math.sin(b.a)*bl);ctx.stroke();
    }
    // Leaves (fade with lifecycle)
    if(p<0.85){
      const lv=1-p/0.85;const autumn=Math.min(Math.max((p-0.4)/0.2,0),1);
      for(const l of this.leaves){
        const lr=l.r*lv;if(lr<1)continue;
        const c=lerpC('#5a8a5a','#c46a4d',autumn);
        ctx.fillStyle=c;ctx.globalAlpha=lv;
        ctx.beginPath();ctx.arc(l.x,l.y,lr,0,6.28);ctx.fill();
      }
      ctx.globalAlpha=1;
    }
    ctx.restore();
  }
}

// ── DRAW ──
function draw(){
  fc++;

  // Lay out canvas regions
  const drawY=TBAR_H+12; // where trees start
  const graphY=H-GAPH;   // where graph starts

  ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);

  // ── TIMELINE MODE ──
  if(mode==='timeline'&&worldData.length>0){
    tlTick++;
    if(tlTick>60){ // 1s per year
      tlTick=0;
      const prev=worldData[tlIdx];
      cumul+=prev.value;
      linePts.push({year:prev.year,cum:cumul});
      // Spawn trees for year
      const absV=Math.abs(prev.value);
      const n=Math.max(2,Math.min(10,Math.round(absV/HECTARES_PER_TREE)));
      const isLoss=prev.value>0;
      for(let i=0;i<n;i++){
        const x=20+Math.random()*(W-40);
        const y=drawY+20+Math.random()*(graphY-drawY-40);
        const mag=0.4+Math.random()*0.6;
        tlTrees.push(new TlTree(x,y,mag,mag,isLoss));
      }
      tlIdx=(tlIdx+1)%worldData.length;
    }

    // ── Top timeline bar ──
    const cur=worldData[tlIdx];
    const startY=4;
    // Thin baseline
    ctx.strokeStyle=EMPTY_C;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(12,TBAR_H-6);ctx.lineTo(W-12,TBAR_H-6);ctx.stroke();
    // Progress dot
    const progress=tlIdx/(worldData.length-1);
    const dx=12+progress*(W-24);
    ctx.fillStyle='#2b2520';ctx.beginPath();ctx.arc(dx,TBAR_H-6,4,0,6.28);ctx.fill();
    // Year number (large, serif)
    ctx.fillStyle='#2b2520';ctx.font='24px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(cur.year,W/2,TBAR_H/2-2);
    // Small data label (minimal, right aligned)
    ctx.fillStyle='rgba(43,37,32,0.35)';ctx.font='9px serif';ctx.textAlign='right';ctx.textBaseline='bottom';
    const dir=cur.value>0?'lost':'gained';ctx.fillText(`${fmtN(Math.abs(cur.value))}ha ${dir}`,W-14,TBAR_H-8);
    // Start/end year labels
    ctx.fillStyle='rgba(43,37,32,0.2)';ctx.font='8px serif';ctx.textAlign='left';ctx.textBaseline='bottom';
    ctx.fillText(worldData[0].year,14,TBAR_H-8);
    ctx.textAlign='right';ctx.fillText(worldData[worldData.length-1].year,W-14,TBAR_H-8);

    // ── Trees area ──
    for(let i=0;i<tlTrees.length;i++)tlTrees[i].draw();

    // ── Bottom cumulative graph ──
    if(linePts.length>1){
      const ptsW=Math.max(W-24,60);
      const gx=12,gy=graphY+4,gH=GAPH-8;
      // Find max abs cumulative for scaling
      let maxC=0;
      for(const p of linePts)if(Math.abs(p.cum)>maxC)maxC=Math.abs(p.cum);
      if(maxC===0)maxC=1;
      const midY=gy+gH/2;
      // Draw line
      ctx.beginPath();ctx.lineWidth=1.5;ctx.lineJoin='round';
      for(let i=0;i<linePts.length;i++){
        const x=gx+(i/(linePts.length-1))*ptsW;
        const ratio=linePts[i].cum/maxC;
        const y=midY-ratio*(gH/2*0.8);
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      // Color based on current cumulative
      const lastC=linePts[linePts.length-1].cum;
      ctx.strokeStyle=lastC>=0?'rgba(74,122,74,0.7)':'rgba(90,58,45,0.7)';
      ctx.stroke();

      // Current cumulative value (tiny)
      ctx.fillStyle='rgba(43,37,32,0.3)';ctx.font='8px serif';ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(`cumulative: ${lastC>=0?'+':''}${fmtN(Math.round(lastC))}ha`,W/2,H-4);
    }
  }

  // ── MANUAL MODE ──
  if(mode==='manual'){
    for(let i=manualTrees.length-1;i>=0;i--){manualTrees[i].update();manualTrees[i].draw();}
    for(let i=manualTrees.length-1;i>=0;i--){if(manualTrees[i].p>=1)manualTrees.splice(i,1);}
    if(manualTrees.length===0){
      ctx.fillStyle='rgba(43,37,32,0.3)';ctx.font='13px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('tap to plant',W/2,H/2);
    }
  }

  requestAnimationFrame(draw);
}

// ── PLANTING ──
let manualTrees=[];
canvas.addEventListener('click',e=>{
  if(touchGuard){touchGuard=false;return;}
  if(e.target.closest('#controls'))return;
  if(mode==='manual'){if(manualTrees.length<30)manualTrees.push(new ManTree(e.clientX,e.clientY));}
});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();touchGuard=true;setTimeout(()=>{touchGuard=false;},200);
  const t=e.touches[0];if(t&&mode==='manual'&&manualTrees.length<30)manualTrees.push(new ManTree(t.clientX,t.clientY));
},{passive:false});
canvas.addEventListener('touchend',e=>e.preventDefault(),{passive:false});

loadData();
manualTrees.push(new ManTree(W/2,H*0.7));
draw();
</script>
</body>
</html>
