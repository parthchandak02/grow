<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Grow — a generative garden</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #f5f0ea;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
/* ponytail: zero dependencies. pure Canvas 2D API. works offline.
   open file → works. */

// ────────────────────────────────────────────── CONFIG
const C = {
  maxTrees: 30,
  // Tree lifecycle phases (fraction of totalLife)
  growEnd: 0.35,
  matureEnd: 0.55,
  autumnEnd: 0.75,
  witherEnd: 0.90,
  totalLife: 720,       // ~12s at 60fps (10-15s range)
  swayAmp: 0.025,
  swaySpeed: 0.0018,
  maxTrunkDepth: 7,
  trunkMin: 45,
  trunkMax: 80,
};

// ────────────────────────────────────────────── PALETTE
const BG = '#f5f0ea';
const BRANCH_C = '#2b2520';
const LEAF_GREEN = ['#5a8a5a','#6b9a6b','#4a7a4a','#7aaa6a','#3d6b3d'];
const LEAF_AUTUMN = ['#c46a4d','#d47a5d','#b45a3d','#a06030','#8b5a3d'];
const TXT = 'tap to plant a tree';

// ────────────────────────────────────────────── CANVAS SETUP
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ────────────────────────────────────────────── HELPERS
function lerpColor(a, b, t) {
  const ar = parseInt(a.slice(1,3), 16), ag = parseInt(a.slice(3,5), 16), ab = parseInt(a.slice(5,7), 16);
  const br = parseInt(b.slice(1,3), 16), bg = parseInt(b.slice(3,5), 16), bb = parseInt(b.slice(5,7), 16);
  return 'rgb(' +
    Math.round(ar + (br - ar) * t) + ',' +
    Math.round(ag + (bg - ag) * t) + ',' +
    Math.round(ab + (bb - ab) * t) + ')';
}

function lerpArray(arr, t) {
  if (t <= 0) return arr[0];
  if (t >= 1) return arr[arr.length - 1];
  const idx = Math.floor(t * (arr.length - 1));
  const frac = (t * (arr.length - 1)) - idx;
  return lerpColor(arr[idx], arr[Math.min(idx + 1, arr.length - 1)], frac);
}

// ────────────────────────────────────────────── STATE
let trees = [];
let fc = 0;
let touchGuard = false;

// ────────────────────────────────────────────── TREE
class Tree {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.age = 0;
    this.phase = Math.random() * Math.PI * 2;
    this.trunkLen = C.trunkMin + Math.random() * (C.trunkMax - C.trunkMin);
    this.trunkDepth = 4 + Math.floor(Math.random() * (C.maxTrunkDepth - 3));
    this.segments = [];
    this.leaves = [];
    // Generate tree structure at birth
    this._grow(0, 0, -Math.PI / 2, this.trunkLen, 0, 0);
  }

  /* Tree growth algorithm:
     - depth 0 = trunk base, goes up with slight lean
     - At each trunk level, 1-3 side branches sprout outward
     - Side branches split 2-4 times into smaller twigs
     - Leaves at terminal twigs
     - "sub" tracks side-branch depth (0 = trunk) */
  _grow(x, y, angle, len, depth, sub) {
    const ex = x + Math.cos(angle) * len;
    const ey = y + Math.sin(angle) * len;
    if (this.y + ey > H * 0.92) return;

    // ponytail: cap total segments to prevent explosion on large screens
    if (this.segments.length > 600) return;

    this.segments.push({ x1: x, y1: y, x2: ex, y2: ey, depth, sub });

    // Leaves at terminal twigs (fine branches that end)
    if (sub >= 2 && len < 18 && Math.random() < 0.55) {
      this.leaves.push({
        x: ex + (Math.random() - 0.5) * 6,
        y: ey + (Math.random() - 0.5) * 6,
        s: 7 + Math.random() * 9,
        r: (Math.random() - 0.5) * Math.PI * 0.7,
        idx: Math.floor(Math.random() * LEAF_GREEN.length)
      });
    }

    if (depth >= this.trunkDepth || len < 3) return;

    if (sub === 0) {
      // --- Trunk ---
      // Side branches sprout at most trunk levels
      if (depth >= 1 && Math.random() < 0.55) {
        const n = 1 + Math.floor(Math.random() * 2); // 1-2 side branches
        for (let i = 0; i < n; i++) {
          const dir = Math.random() < 0.5 ? 1 : -1;
          const sa = angle + dir * (0.4 + Math.random() * 0.8);
          const sl = len * (0.4 + Math.random() * 0.2);
          this._grow(ex, ey, sa, sl, depth + 1, 1);
        }
      }
      // Continue trunk (slight lean)
      const ta = angle + (Math.random() - 0.5) * 0.12;
      const tl = len * (0.72 + Math.random() * 0.08);
      this._grow(ex, ey, ta, tl, depth + 1, 0);
    } else {
      // --- Side branch ---
      const n = Math.random() < 0.15 ? 1 : 2; // 1-2 children
      for (let i = 0; i < n; i++) {
        const a = angle + (Math.random() - 0.5) * 1.0;
        const l = len * (0.55 + Math.random() * 0.2);
        this._grow(ex, ey, a, l, depth + 1, sub + 1);
      }
    }
  }

  get p() { return Math.min(this.age / C.totalLife, 1); }

  update() {
    if (this.age < C.totalLife) this.age++;
  }

  draw() {
    const p = this.p;
    ctx.save();
    ctx.translate(this.x, this.y);

    // Seed-to-full scale during first 8% of growth
    if (p < 0.08) {
      const s = 0.1 + p * 11.25;
      ctx.scale(s, s);
    }

    // Gentle sway during mature phase; slows in autumn, stops in wither
    if (p < C.witherEnd) {
      const swayStr = p < C.growEnd ? p / C.growEnd : 1;
      ctx.rotate(Math.sin(fc * C.swaySpeed + this.phase) * C.swayAmp * swayStr);
    }

    // ── Branch phase ──
    // Growth: draw from base up
    // Mature: draw all
    // Autumn/wither: draw all but darken
    const growP = Math.min(p / C.growEnd, 1);
    const segCount = Math.floor(this.segments.length * growP);

    // Branch color: darkens through wither phase
    let branchColor = BRANCH_C;
    if (p > C.autumnEnd) {
      const t = Math.min((p - C.autumnEnd) / (C.witherEnd - C.autumnEnd), 1);
      branchColor = lerpColor(BRANCH_C, '#1a1510', t);
    }

    for (let i = 0; i < segCount; i++) {
      const s = this.segments[i];
      // Branch thickness: trunk is thickest, tapers with depth
      let w;
      if (s.sub === 0) {
        // Trunk: thick, tapers slowly
        w = 5.0 - (s.depth / this.trunkDepth) * 3.5;
      } else {
        // Side branches: thinner, tapers with sub-depth
        w = Math.max(0.4, 2.5 - (s.sub / 4) * 2.0);
      }
      ctx.strokeStyle = branchColor;
      ctx.lineWidth = w;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(s.x1, s.y1);
      ctx.lineTo(s.x2, s.y2);
      ctx.stroke();
    }

    // ── Leaves ──
    // Appear during growth, full during mature, change color in autumn, fall in wither
    if (p < C.witherEnd) {
      const leafAppear = Math.min(Math.max((p - 0.15) / (C.growEnd - 0.15), 0), 1);
      let leafCount = Math.floor(this.leaves.length * leafAppear);

      // Leaves fall off during wither phase
      if (p > C.autumnEnd) {
        const fallP = (p - C.autumnEnd) / (C.witherEnd - C.autumnEnd);
        leafCount = Math.floor(leafCount * (1 - fallP * 0.8));
      }

      for (let i = 0; i < leafCount; i++) {
        const l = this.leaves[i];
        ctx.save();
        ctx.translate(l.x, l.y);
        ctx.rotate(l.r);

        // Leaf sway during mature phase
        if (p > C.growEnd && p < C.autumnEnd) {
          ctx.rotate(Math.sin(fc * C.swaySpeed * 1.5 + this.phase + i) * C.swayAmp * 0.6);
        }

        // Leaf color: green → autumn → brown
        let leafColor;
        if (p < C.matureEnd) {
          // Green phase
          const cp = Math.min((p - C.growEnd * 0.5) / (C.matureEnd - C.growEnd * 0.5), 1);
          const greens = LEAF_GREEN;
          leafColor = lerpArray(greens, (l.idx + i * 0.1) % 1);
        } else if (p < C.autumnEnd) {
          // Transition green → autumn
          const t = (p - C.matureEnd) / (C.autumnEnd - C.matureEnd);
          const green = lerpArray(LEAF_GREEN, (l.idx + i * 0.1) % 1);
          const autumn = lerpArray(LEAF_AUTUMN, (l.idx + i * 0.15) % 1);
          leafColor = lerpColor(green, autumn, t);
        } else {
          // Autumn → brown transition
          const t = Math.min((p - C.autumnEnd) / (C.witherEnd - C.autumnEnd) * 1.5, 1);
          const autumn = lerpArray(LEAF_AUTUMN, (l.idx + i * 0.15) % 1);
          leafColor = lerpColor(autumn, '#8b6b4a', t);
        }

        ctx.fillStyle = leafColor;
        ctx.beginPath();
        ctx.ellipse(0, 0, l.s / 2, l.s * 0.28, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ── Death phase: fade out ──
    if (p > C.witherEnd) {
      const deathP = (p - C.witherEnd) / (1 - C.witherEnd);
      const alpha = 1 - deathP;
      // Also shrink slightly as it fades
      if (deathP > 0.3) {
        ctx.translate(0, deathP * 15); // droop downward
        const shrink = 1 - (deathP - 0.3) * 0.3;
        ctx.scale(shrink, shrink);
      }
      ctx.globalAlpha = Math.max(0, alpha);
    }

    ctx.restore();
  }
}

// ────────────────────────────────────────────── DRAW LOOP
function draw() {
  fc++;

  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  // Update & draw trees (newest on top)
  for (let i = trees.length - 1; i >= 0; i--) {
    trees[i].update();
    trees[i].draw();
  }

  // Remove fully dead trees (faded out)
  for (let i = trees.length - 1; i >= 0; i--) {
    if (trees[i].p >= 1) {
      trees.splice(i, 1);
    }
  }

  // Instruction
  if (trees.length < 5) {
    ctx.fillStyle = BRANCH_C;
    ctx.font = '13px serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'bottom';
    ctx.fillText(TXT, 16, H - 16);
  }

  requestAnimationFrame(draw);
}

// ────────────────────────────────────────────── PLANTING
function plantAt(x, y) {
  // If at capacity, don't plant (natural death will free space)
  if (trees.length < C.maxTrees) {
    trees.push(new Tree(x, y));
  }
}

canvas.addEventListener('click', (e) => {
  if (touchGuard) { touchGuard = false; return; }
  plantAt(e.clientX, e.clientY);
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  touchGuard = true;
  setTimeout(() => { touchGuard = false; }, 200);
  const t = e.touches[0];
  if (t) plantAt(t.clientX, t.clientY);
}, { passive: false });

canvas.addEventListener('touchend', (e) => e.preventDefault(), { passive: false });

// ────────────────────────────────────────────── START
trees.push(new Tree(W / 2, H * 0.68));
draw();
</script>
</body>
</html>
